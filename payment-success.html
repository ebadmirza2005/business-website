<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Result - Faaz Pro Tech</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/brain.png">
    <style>
        .result-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.09);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e8f6ff;
        }
        .result-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .result-details {
            background: rgba(33, 198, 255, 0.1);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .result-details p {
            margin: 0.5rem 0;
            color: #d0e8f4;
        }
        .result-details strong {
            color: #fff;
        }
        .error-details {
            background: rgba(255, 199, 199, 0.1);
            border: 1px solid rgba(255, 199, 199, 0.3);
            color: #ffc7c7;
        }
        .success-details {
            background: rgba(215, 255, 223, 0.1);
            border: 1px solid rgba(215, 255, 223, 0.3);
            color: #d7ffdf;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .button-group a {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-primary-link {
            background: linear-gradient(120deg, #21c6ff, #0ba3f2 45%, #0dddb4);
            color: #02243a;
        }
        .btn-primary-link:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .btn-secondary-link {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary-link:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #21c6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #03101b 0%, #072033 42%, #041723 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="result-container">
        <div id="status"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id');
            const statusDiv = document.getElementById('status');

            if (!sessionId) {
                showError('Error', 'Invalid session ID. Please contact support.');
                return;
            }

            // Show loading state
            statusDiv.innerHTML = `
                <div class="spinner"></div>
                <p style="color: #b7cedc;">Verifying your payment...</p>
            `;

            try {
                const response = await fetch('check-payment.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });

                const data = await response.json();

                if (!data.success) {
                    showError('Payment Verification Failed', data.message);
                    return;
                }

                if (data.isPaid) {
                    showSuccess(data);
                } else {
                    showError('Payment Pending', 'Your payment is still being processed. Please refresh this page in a moment.');
                }

            } catch (error) {
                console.error('Error:', error);
                showError('Connection Error', 'Unable to verify payment. Please contact support if you were charged.');
            }
        });

        function showSuccess(data) {
            const statusDiv = document.getElementById('status');
            const amount = (data.amount / 100).toFixed(2);
            
            statusDiv.innerHTML = `
                <div class="result-icon">✅</div>
                <h1 style="font-family: 'Urbanist', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; color: #21c6ff;">Payment Successful!</h1>
                <p style="color: #b7cedc; margin-bottom: 1.5rem; line-height: 1.6;">
                    Thank you for your purchase. We've received your payment and will begin working on your project shortly.
                </p>
                
                <div class="result-details success-details">
                    <p><strong>Order Status:</strong> Confirmed</p>
                    <p><strong>Package:</strong> ${data.packageName}</p>
                    <p><strong>Service:</strong> ${data.packageType.charAt(0).toUpperCase() + data.packageType.slice(1).replace('-', ' ')}</p>
                    <p><strong>Amount Paid:</strong> $${amount}</p>
                    <p><strong>Email:</strong> ${data.customer_email || 'Not provided'}</p>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: #b7d6e5;">
                        Session ID: <span style="font-family: monospace; word-break: break-all;">${sessionId.substring(0, 30)}...</span>
                    </p>
                </div>

                <p style="color: #9fb8c8; margin-bottom: 1rem;">
                    A confirmation email has been sent to <strong>${data.customer_email}</strong>. You'll receive updates about your project shortly.
                </p>

                <div class="button-group">
                    <a href="index.php" class="btn-primary-link">Back to Home</a>
                    <a href="index.php#contact" class="btn-secondary-link">Track Order</a>
                </div>
            `;
        }

        function showError(title, message) {
            const statusDiv = document.getElementById('status');
            
            statusDiv.innerHTML = `
                <div class="result-icon">❌</div>
                <h1 style="font-family: 'Urbanist', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; color: #ffc7c7;">${title}</h1>
                
                <div class="result-details error-details">
                    <p style="color: #ffc7c7; margin: 0;">${message}</p>
                </div>

                <p style="color: #9fb8c8; margin: 1rem 0;">
                    If you were charged for this transaction, please contact our support team immediately, and we will process a refund.
                </p>

                <div class="button-group">
                    <a href="index.php#packages" class="btn-primary-link">Try Again</a>
                    <a href="index.php#contact" class="btn-secondary-link">Contact Support</a>
                </div>
            `;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment System Diagnostics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #ddd;
        }
        .test.pass {
            border-left-color: #28a745;
            background: #d4edda;
        }
        .test.fail {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        .test.warning {
            border-left-color: #ffc107;
            background: #fff3cd;
        }
        h1 {
            color: #333;
        }
        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 14px;
        }
        .status {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🔧 Payment System Diagnostics</h1>
    <p>Testing your payment system configuration...</p>
    
    <div id="tests"></div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const testsContainer = document.getElementById('tests');

        async function runTests() {
            const tests = [];

            // Test 1: Check if Stripe.js is loaded
            tests.push({
                name: 'Stripe.js Library',
                test: () => typeof Stripe !== 'undefined',
                message: 'Stripe library loaded from CDN'
            });

            // Test 2: Check config-frontend.php
            tests.push({
                name: 'Frontend Config',
                test: async () => {
                    const response = await fetch('config-frontend.php');
                    const data = await response.json();
                    return data.stripePublicKey && !data.stripePublicKey.includes('your_public_key');
                },
                message: 'config-frontend.php responding correctly'
            });

            // Test 3: Get Stripe Public Key
            let stripeKey = 'Not found';
            try {
                const response = await fetch('config-frontend.php');
                const data = await response.json();
                stripeKey = data.stripePublicKey ? data.stripePublicKey.substring(0, 15) + '...' : 'Not configured';
            } catch (e) {}

            // Test 4: Check if Stripe can be initialized
            tests.push({
                name: 'Stripe Initialization',
                test: async () => {
                    try {
                        const response = await fetch('config-frontend.php');
                        const data = await response.json();
                        if (!data.stripePublicKey || data.stripePublicKey.includes('your_public_key')) {
                            return false;
                        }
                        const stripe = Stripe(data.stripePublicKey);
                        return !!stripe;
                    } catch (e) {
                        console.error('Stripe init error:', e);
                        return false;
                    }
                },
                message: 'Stripe can be initialized with public key: ' + stripeKey
            });

            // Test 5: Check if payment.php exists
            tests.push({
                name: 'Payment Endpoint',
                test: async () => {
                    try {
                        const response = await fetch('payment.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                packageName: 'test',
                                amount: 0,
                                email: 'test@example.com',
                                packageType: 'test'
                            })
                        });
                        return response.status !== 404;
                    } catch (e) {
                        return false;
                    }
                },
                message: 'payment.php endpoint is accessible'
            });

            // Test 6: Check if check-payment.php exists
            tests.push({
                name: 'Verification Endpoint',
                test: async () => {
                    try {
                        const response = await fetch('check-payment.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sessionId: 'test' })
                        });
                        return response.status !== 404;
                    } catch (e) {
                        return false;
                    }
                },
                message: 'check-payment.php endpoint is accessible'
            });

            // Test 7: Check DOM elements
            tests.push({
                name: 'Payment Modal HTML',
                test: () => document.getElementById('paymentModal') !== null,
                message: 'Payment modal element exists'
            });

            // Test 8: Check card element
            tests.push({
                name: 'Card Element Container',
                test: () => document.getElementById('card-element') !== null,
                message: 'Card element container exists'
            });

            // Run all tests
            for (const test of tests) {
                let result, pass, warning = false;
                try {
                    result = await test.test();
                    pass = result === true;
                    if (pass === false && test.name === 'Stripe Public Key' && stripeKey.includes('...')) {
                        warning = true;
                    }
                } catch (e) {
                    pass = false;
                    console.error(`Test failed: ${test.name}`, e);
                }

                const testDiv = document.createElement('div');
                testDiv.className = 'test ' + (pass ? 'pass' : warning ? 'warning' : 'fail');
                testDiv.innerHTML = `
                    <strong>${pass ? '✓' : warning ? '⚠' : '✗'} ${test.name}</strong>
                    <div class="status">${test.message}</div>
                `;
                testsContainer.appendChild(testDiv);
            }
        }

        // Run tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
